name: Reusable IaC Security

# Universal IaC security scanning consumed by every NWarila template
# repository (Terraform / Packer / Ansible runner + framework templates).
# Three independent jobs run in parallel:
#
# - Trivy:    filesystem misconfig + secret scanning, fail on HIGH/CRITICAL
# - Gitleaks: full-history secret detection
# - zizmor:   GitHub Actions security analysis (injection via ${{ }},
#             untrusted input as code, dangerous triggers, etc.)
#
# All three upload SARIF where applicable so findings appear in the
# consumer's GitHub Security tab.
#
# Caller pattern:
#   uses: <owner>/<template-repo>/.github/workflows/reusable-iac-security.yaml@<sha>

on:
  workflow_call:
    inputs:
      trivy_severity:
        description: Comma-separated Trivy severity levels that fail the build.
        required: false
        type: string
        default: "HIGH,CRITICAL"
      enable_zizmor:
        description: Run zizmor (GitHub Actions security analysis).
        required: false
        type: boolean
        default: true
      enable_trivy:
        description: Run Trivy filesystem scan.
        required: false
        type: boolean
        default: true
      enable_gitleaks:
        description: Run Gitleaks history scan.
        required: false
        type: boolean
        default: true
permissions: {}

jobs:
  trivy:
    name: Trivy (filesystem & secrets)
    if: ${{ inputs.enable_trivy }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read # required by Trivy to scan repository contents
      security-events: write # required to upload Trivy SARIF to GitHub Security
      actions: read # required for SARIF upload workflow metadata
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Generate Trivy SARIF report
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: ${{ inputs.trivy_severity }}
          scanners: "misconfig,secret"

      - name: Enforce Trivy policy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          severity: ${{ inputs.trivy_severity }}
          scanners: "misconfig,secret"
          exit-code: "1"

      - name: Upload Trivy SARIF to GitHub Security
        # SARIF upload requires GitHub Advanced Security on private repos.
        # continue-on-error keeps the scan job green even when the upload
        # is rejected — findings still appear in the run log.
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        if: always()
        continue-on-error: true
        with:
          sarif_file: "trivy-results.sarif"

  gitleaks:
    name: Gitleaks (secret scan)
    if: ${{ inputs.enable_gitleaks }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read # required by Gitleaks to scan repository history
      security-events: write # required to upload Gitleaks SARIF to GitHub Security
      actions: read # required for SARIF upload workflow metadata
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Gitleaks (with SARIF output)
        id: gitleaks_run
        # Gitleaks 8.18+ supports --report-format sarif. Emitting SARIF
        # lets findings flow into the consumer's GitHub Security tab
        # alongside CodeQL, Trivy, zizmor, and Scorecard results.
        uses: docker://ghcr.io/gitleaks/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f
        with:
          args: detect --source . --redact --verbose --no-banner --report-format sarif --report-path gitleaks.sarif --exit-code 1

      - name: Upload Gitleaks SARIF to GitHub Security
        # SARIF upload requires GitHub Advanced Security on private repos.
        # continue-on-error keeps the scan job green even if the upload is
        # rejected — the gitleaks step above remains the gate.
        if: always() && hashFiles('gitleaks.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: gitleaks.sarif

  zizmor:
    name: zizmor (Actions security)
    if: ${{ inputs.enable_zizmor }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read # required by zizmor to inspect workflow files
      security-events: write # required to upload zizmor SARIF to GitHub Security
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install zizmor
        # renovate: datasource=pypi depName=zizmor
        run: python -m pip install --no-cache-dir zizmor==1.25.2

      - name: Run zizmor
        # Emit SARIF for the GitHub Security tab and run the same pedantic
        # gate required by the fleet audit.
        run: |
          set -o pipefail
          zizmor --format sarif --persona pedantic .github/workflows/ \
            > zizmor.sarif || rc=$?
          echo "zizmor exit code: ${rc:-0}"
          # Re-run for human-readable output in the log.
          zizmor --persona pedantic .github/workflows/ || true
          exit "${rc:-0}"

      - name: Upload zizmor SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: zizmor.sarif
          category: zizmor
