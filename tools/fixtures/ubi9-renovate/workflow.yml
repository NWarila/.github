name: fixture

on:
  pull_request:

jobs:
  fixture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa # v6.0.0
      - uses: actions/setup-go@bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb # v6.0.0
        with:
          go-version: "1.25.3"
      - uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@cccccccccccccccccccccccccccccccccccccccc # v2.1.0
      - name: verify signer
        run: |
          cosign verify-attestation ghcr.io/nwarila-platform/base-node@sha256:3333333333333333333333333333333333333333333333333333333333333333 --certificate-identity=https://github.com/slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@refs/tags/v2.1.0 --certificate-oidc-issuer=https://token.actions.githubusercontent.com
          gh attestation verify oci://ghcr.io/nwarila-platform/base-node@sha256:3333333333333333333333333333333333333333333333333333333333333333 --signer-workflow https://github.com/slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@refs/tags/v2.1.0
      - name: run gates
        run: |
          podman run --rm ghcr.io/nwarila-platform/base-node@sha256:3333333333333333333333333333333333333333333333333333333333333333 true
          docker run --rm ghcr.io/nwarila-platform/gate-python@sha256:4444444444444444444444444444444444444444444444444444444444444444 verify.py
          docker run --rm ghcr.io/nwarila-platform/gate-iac:1.15.1@sha256:5555555555555555555555555555555555555555555555555555555555555555 terraform validate
          docker run --rm ghcr.io/nwarila-platform/gate-iac:1.15.6@sha256:6666666666666666666666666666666666666666666666666666666666666666 terraform validate
